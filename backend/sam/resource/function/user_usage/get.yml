GetUserUsagesFunction:
  Type: AWS::Serverless::Function
  Metadata:
    BuildMethod: go1.x
  Properties:
    FunctionName: GetUserUsagesFunction
    Description: !Sub
      - Stack ${AWS::StackName} Function ${ResourceName}
      - ResourceName: GetUserUsagesFunction
    CodeUri: cmd/user_usage/get
    Handler: bootstrap
    Runtime: provided.al2023
    MemorySize: 128
    Timeout: 30
    Tracing: Active
    Events:
      ApiGetUserUsages:
        Type: Api
        Properties:
          Path: /user-usages
          Method: GET
          RestApiId: !Ref Api
    Environment:
      Variables:
        USER_TABLE_NAME: !Ref UserTable
        USER_TABLE_ARN: !GetAtt UserTable.Arn
        SUBJECT_TABLE_NAME: !Ref SubjectTable
        SUBJECT_TABLE_ARN: !GetAtt SubjectTable.Arn
        SCHEDULE_TABLE_NAME: !Ref ScheduleTable
        SCHEDULE_TABLE_ARN: !GetAtt ScheduleTable.Arn
        ADMIN_EMAILS: !Ref AdminEmails
    Policies:
      - DynamoDBCrudPolicy:
          TableName: !Ref UserTable
      - DynamoDBCrudPolicy:
          TableName: !Ref SubjectTable
      - DynamoDBCrudPolicy:
          TableName: !Ref ScheduleTable
GetUserUsagesFunctionPermission:
  Type: AWS::Lambda::Permission
  Properties:
    FunctionName: !GetAtt GetUserUsagesFunction.Arn
    Action: lambda:InvokeFunction
    Principal: apigateway.amazonaws.com
GetUserUsagesFunctionLogGroup:
  Type: AWS::Logs::LogGroup
  DeletionPolicy: Retain
  Properties:
    LogGroupName: !Sub /aws/lambda/${GetUserUsagesFunction}
